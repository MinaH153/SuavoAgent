name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Solution-level restore/build MUST NOT pass -r <RID>.
      # .NET SDK 8.0.400+ hard-errors on NETSDK1134 ("Building a solution with
      # a specific RuntimeIdentifier is not supported"). The RID only belongs
      # at publish time (see cross-compile job below). Tests don't need a RID.
      - name: Restore
        run: dotnet restore SuavoAgent.sln

      - name: Build
        run: dotnet build SuavoAgent.sln -c Release --no-restore

      - name: Test
        run: dotnet test SuavoAgent.sln -c Release --no-build -v normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/test-results.trx"

  cross-compile:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Core (win-x64)
        run: dotnet publish src/SuavoAgent.Core -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o artifacts/

      - name: Publish Broker (win-x64)
        run: dotnet publish src/SuavoAgent.Broker -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o artifacts/

      - name: Publish Helper (win-x64)
        run: dotnet publish src/SuavoAgent.Helper -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o artifacts/

      - name: Publish Setup (win-x64)
        run: dotnet publish src/SuavoAgent.Setup -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-x64-binaries
          path: artifacts/*.exe
