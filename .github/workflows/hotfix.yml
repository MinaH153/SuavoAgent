name: Hotfix

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v3.0.1)'
        required: true
        type: string
      description:
        description: 'What this hotfix fixes'
        required: true
        type: string

permissions:
  contents: write

jobs:
  hotfix-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Validate version format
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$INPUT_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $INPUT_VERSION"
            exit 1
          fi
          VERSION_NUMERIC="${INPUT_VERSION#v}"
          echo "VERSION_NUMERIC=$VERSION_NUMERIC" >> "$GITHUB_OUTPUT"

      - name: Build + Test
        env:
          VERSION_NUMERIC: ${{ steps.version.outputs.VERSION_NUMERIC }}
        run: |
          dotnet build SuavoAgent.sln -c Release -p:Version="$VERSION_NUMERIC"
          dotnet test SuavoAgent.sln -c Release --no-build -v normal

      - name: Publish all binaries
        env:
          VERSION_NUMERIC: ${{ steps.version.outputs.VERSION_NUMERIC }}
        run: |
          for proj in Core Broker Helper Watchdog Setup; do
            dotnet publish src/SuavoAgent.$proj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:Version="$VERSION_NUMERIC" -o release/
          done

      - name: Generate + sign checksums
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY_PEM }}
        run: |
          cd release
          sha256sum SuavoAgent.Core.exe SuavoAgent.Broker.exe SuavoAgent.Helper.exe SuavoAgent.Watchdog.exe > checksums.sha256
          openssl dgst -sha256 -sign <(echo "$SIGNING_KEY") -out checksums.sha256.sig checksums.sha256

      - name: Generate + sign OTA update manifest
        env:
          VERSION: ${{ inputs.version }}
          VERSION_NUMERIC: ${{ steps.version.outputs.VERSION_NUMERIC }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY_PEM }}
        run: |
          set -euo pipefail
          cd release
          CORE_SHA=$(sha256sum SuavoAgent.Core.exe | awk '{print $1}')
          BROKER_SHA=$(sha256sum SuavoAgent.Broker.exe | awk '{print $1}')
          HELPER_SHA=$(sha256sum SuavoAgent.Helper.exe | awk '{print $1}')
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"
          MANIFEST="${BASE_URL}/SuavoAgent.Core.exe|${CORE_SHA}|${BASE_URL}/SuavoAgent.Broker.exe|${BROKER_SHA}|${BASE_URL}/SuavoAgent.Helper.exe|${HELPER_SHA}|${VERSION_NUMERIC}|net8.0|win-x64"
          printf '%s' "$MANIFEST" > "update-manifest-${VERSION}.txt"
          printf '%s' "$MANIFEST" | openssl dgst -sha256 -sign <(echo "$SIGNING_KEY") | xxd -p -c 256 > "update-manifest-${VERSION}.sig"

      - name: Create tag
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          git tag "$INPUT_VERSION"
          git push origin "$INPUT_VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "${{ inputs.version }} — Hotfix"
          body: |
            ## Hotfix: ${{ inputs.description }}

            Emergency release from hotfix pipeline.
            **Tests:** All passing before release.
          files: |
            release/SuavoAgent.Core.exe
            release/SuavoAgent.Broker.exe
            release/SuavoAgent.Helper.exe
            release/SuavoAgent.Watchdog.exe
            release/SuavoSetup.exe
            release/checksums.sha256
            release/checksums.sha256.sig
            release/update-manifest-v*.txt
            release/update-manifest-v*.sig
