name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # --- Build unsigned binaries on Linux -----------------------------------
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      version_numeric: ${{ steps.version.outputs.VERSION_NUMERIC }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION_NUMERIC="${TAG#v}"
          echo "VERSION=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION_NUMERIC=$VERSION_NUMERIC" >> "$GITHUB_OUTPUT"

      - name: Restore + Build
        env:
          VERSION_NUMERIC: ${{ steps.version.outputs.VERSION_NUMERIC }}
        run: dotnet build SuavoAgent.sln -c Release -p:Version="$VERSION_NUMERIC"

      - name: Test
        run: dotnet test SuavoAgent.sln -c Release --no-build -v normal

      - name: Publish binaries
        env:
          VERSION_NUMERIC: ${{ steps.version.outputs.VERSION_NUMERIC }}
        run: |
          for proj in Core Broker Helper Watchdog Setup; do
            dotnet publish src/SuavoAgent.$proj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -p:Version="$VERSION_NUMERIC" -o release/
          done

      - name: Upload unsigned binaries
        uses: actions/upload-artifact@v4
        with:
          name: suavoagent-unsigned-${{ steps.version.outputs.VERSION }}
          path: release/
          retention-days: 7

  # --- Authenticode sign with Yubikey (self-hosted Windows runner) --------
  # Runs only when repo variable SIGNING_ENABLED=true AND a labeled self-hosted
  # Windows runner with Yubikey is online. Otherwise the passthrough job below
  # runs instead. Flip SIGNING_ENABLED to true once the Yubikey has arrived
  # and the self-hosted runner is registered. See docs/signing.md.
  sign_windows:
    if: ${{ vars.SIGNING_ENABLED == 'true' }}
    needs: build
    runs-on: [self-hosted, windows, yubikey]
    steps:
      - name: Download unsigned binaries
        uses: actions/download-artifact@v4
        with:
          name: suavoagent-unsigned-${{ needs.build.outputs.version }}
          path: release

      - name: Sign binaries with signtool
        shell: pwsh
        env:
          CERT_THUMBPRINT: ${{ secrets.SIGNING_CERT_THUMBPRINT }}
          TIMESTAMP_URL: ${{ vars.SIGNING_TIMESTAMP_URL }}
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not $env:CERT_THUMBPRINT) {
            throw "Secret SIGNING_CERT_THUMBPRINT is not set. See docs/signing.md."
          }
          $ts = if ($env:TIMESTAMP_URL) { $env:TIMESTAMP_URL } else { 'http://ts.ssl.com' }

          # Locate signtool.exe from installed Windows SDKs. Prefer the newest.
          $candidates = @(
            "${env:ProgramFiles(x86)}\Windows Kits\10\bin",
            "${env:ProgramFiles}\Windows Kits\10\bin"
          ) | Where-Object { Test-Path $_ } | ForEach-Object { Get-ChildItem $_ -Directory } | Sort-Object Name -Descending
          $signtool = $null
          foreach ($dir in $candidates) {
            $path = Join-Path $dir 'x64\signtool.exe'
            if (Test-Path $path) { $signtool = $path; break }
          }
          if (-not $signtool) { throw 'signtool.exe not found. Install Windows 10 SDK.' }
          Write-Host "Using signtool: $signtool"

          $targets = @(
            'release/SuavoAgent.Core.exe',
            'release/SuavoAgent.Broker.exe',
            'release/SuavoAgent.Helper.exe',
            'release/SuavoAgent.Watchdog.exe',
            'release/SuavoSetup.exe'
          )
          foreach ($t in $targets) {
            if (-not (Test-Path $t)) { throw "Missing binary: $t" }
            Write-Host "Signing $t"
            & $signtool sign /fd SHA256 /tr $ts /td SHA256 /sha1 $env:CERT_THUMBPRINT $t
            if ($LASTEXITCODE -ne 0) { throw "signtool failed on $t (exit $LASTEXITCODE)" }
            & $signtool verify /pa /v $t
            if ($LASTEXITCODE -ne 0) { throw "signtool verify failed on $t (exit $LASTEXITCODE)" }
          }

      - name: Upload signed binaries
        uses: actions/upload-artifact@v4
        with:
          name: suavoagent-final-${{ needs.build.outputs.version }}
          path: release/
          retention-days: 7

  # --- Passthrough when signing is disabled -------------------------------
  # Keeps the release pipeline functional without a Yubikey. Renames the
  # artifact to the name the release job expects.
  sign_passthrough:
    if: ${{ vars.SIGNING_ENABLED != 'true' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download unsigned binaries
        uses: actions/download-artifact@v4
        with:
          name: suavoagent-unsigned-${{ needs.build.outputs.version }}
          path: release

      - name: Upload as final (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: suavoagent-final-${{ needs.build.outputs.version }}
          path: release/
          retention-days: 7

  # --- Checksums, manifest, GitHub release --------------------------------
  release:
    needs: [build, sign_windows, sign_passthrough]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.sign_windows.result == 'success' || needs.sign_passthrough.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download final binaries
        uses: actions/download-artifact@v4
        with:
          name: suavoagent-final-${{ needs.build.outputs.version }}
          path: release

      - name: Generate checksums
        run: |
          cd release
          sha256sum SuavoAgent.Core.exe SuavoAgent.Broker.exe SuavoAgent.Helper.exe SuavoAgent.Watchdog.exe > checksums.sha256
          cat checksums.sha256

      - name: Sign checksums (ECDSA P-256)
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY_PEM }}
        run: |
          openssl dgst -sha256 -sign <(echo "$SIGNING_KEY") -out release/checksums.sha256.sig release/checksums.sha256

      - name: Generate + sign OTA update manifest
        env:
          VERSION: ${{ needs.build.outputs.version }}
          VERSION_NUMERIC: ${{ needs.build.outputs.version_numeric }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY_PEM }}
        run: |
          set -euo pipefail
          cd release
          CORE_SHA=$(sha256sum SuavoAgent.Core.exe | awk '{print $1}')
          BROKER_SHA=$(sha256sum SuavoAgent.Broker.exe | awk '{print $1}')
          HELPER_SHA=$(sha256sum SuavoAgent.Helper.exe | awk '{print $1}')
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}"
          # Pipe-delimited manifest matching v3.12.0 + v3.13.0 format:
          # <core_url>|<core_sha>|<broker_url>|<broker_sha>|<helper_url>|<helper_sha>|<version>|net8.0|win-x64
          MANIFEST="${BASE_URL}/SuavoAgent.Core.exe|${CORE_SHA}|${BASE_URL}/SuavoAgent.Broker.exe|${BROKER_SHA}|${BASE_URL}/SuavoAgent.Helper.exe|${HELPER_SHA}|${VERSION_NUMERIC}|net8.0|win-x64"
          printf '%s' "$MANIFEST" > "update-manifest-${VERSION}.txt"
          printf '%s' "$MANIFEST" | openssl dgst -sha256 -sign <(echo "$SIGNING_KEY") | xxd -p -c 256 > "update-manifest-${VERSION}.sig"
          echo "Manifest bytes: $(wc -c < update-manifest-${VERSION}.txt)"
          echo "Signature bytes: $(wc -c < update-manifest-${VERSION}.sig)"

      - name: Determine release mode
        id: mode
        env:
          SIGN_RESULT: ${{ needs.sign_windows.result }}
        run: |
          if [[ "$SIGN_RESULT" == "success" ]]; then
            echo "MODE=signed" >> "$GITHUB_OUTPUT"
          else
            echo "MODE=unsigned" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ needs.build.outputs.version }} — Phantom"
          body: |
            ## SuavoAgent ${{ needs.build.outputs.version }}

            Automated release from CI/CD pipeline.

            **Tests:** All passing
            **Checksums:** ECDSA P-256 signed
            **Authenticode:** ${{ steps.mode.outputs.MODE == 'signed' && 'Signed (Yubikey EV)' || 'Unsigned (SmartScreen warning expected)' }}

            ### How to update existing agents
            Push the update command from the fleet dashboard. Agents auto-update on next heartbeat (30s).

            ### Fresh install
            ```powershell
            irm https://raw.githubusercontent.com/MinaH153/SuavoAgent/main/bootstrap.ps1 | iex
            ```
          files: |
            release/SuavoAgent.Core.exe
            release/SuavoAgent.Broker.exe
            release/SuavoAgent.Helper.exe
            release/SuavoAgent.Watchdog.exe
            release/SuavoSetup.exe
            release/checksums.sha256
            release/checksums.sha256.sig
            release/update-manifest-v*.txt
            release/update-manifest-v*.sig
          draft: false
          prerelease: false
