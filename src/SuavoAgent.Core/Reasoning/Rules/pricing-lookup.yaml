# Pricing lookup skill — navigate PioneerRx Item → Rx Item → Pricing tab.
#
# Each rule represents ONE step of the workflow with pre+post conditions.
# Rules are keyed by SkillId + state signature. The executor walks them in
# order, falling back to Tier 2 only if no rule matches the current state.
#
# Safety preconditions (operator-idle, call-active, PMS focus) live in
# preconditions.yaml and run automatically before any rule in this file.
#
# Maintenance: when PioneerRx changes a control name, update the single
# matching rule here. No C# recompile needed.

rules:
  - id: pricing-lookup.open-item-menu
    skillId: pricing-lookup
    priority: 190
    description: "Click the Item menu in the top menu bar"
    when:
      processName: "PioneerPharmacy*"
      visibleElements: ["Item"]
      operatorIdleMsAtLeast: 500
    then:
      - type: Click
        description: "Open Item menu"
        parameters:
          controlType: "MenuItem"
          name: "Item"
        verifyAfter:
          visibleElements: ["Rx Item"]

  - id: pricing-lookup.open-rx-item
    skillId: pricing-lookup
    priority: 180
    description: "Click Rx Item under Item menu"
    when:
      processName: "PioneerPharmacy*"
      visibleElements: ["Rx Item"]
    then:
      - type: Click
        description: "Open Rx Item submenu"
        parameters:
          controlType: "MenuItem"
          name: "Rx Item"
        verifyAfter:
          visibleElements: ["Edit Rx Item"]

  - id: pricing-lookup.search-ndc
    skillId: pricing-lookup
    priority: 170
    description: "Type NDC into Quick Search and press Enter"
    when:
      processName: "PioneerPharmacy*"
      visibleElements: ["Edit Rx Item", "Quick Search"]
    then:
      - type: Click
        description: "Focus Quick Search field"
        parameters:
          controlType: "Edit"
          helpText: "Quick Search"
      # Executor contracts (Type source, VerifyElement containsFromContext) are
      # defined in Week 2 when LocalInference + ActionExecutor land. Until then
      # this rule escalates by design.
      - type: Escalate
        description: "Hand off to Tier 2 for parameterized NDC entry + verify"

  - id: pricing-lookup.open-pricing-tab
    skillId: pricing-lookup
    priority: 160
    description: "Click the Pricing tab within Edit Rx Item"
    when:
      processName: "PioneerPharmacy*"
      visibleElements: ["Edit Rx Item", "Pricing"]
    then:
      - type: Click
        description: "Open Pricing tab"
        parameters:
          controlType: "TabItem"
          name: "Pricing"
        verifyAfter:
          visibleElements: ["Supplier", "Cost Per Unit"]

  - id: pricing-lookup.close-edit-window
    skillId: pricing-lookup
    priority: 10
    description: "Rollback — close Edit Rx Item dialog"
    when:
      processName: "PioneerPharmacy*"
      visibleElements: ["Edit Rx Item"]
    then:
      - type: PressKey
        parameters:
          key: "Escape"
      - type: PressKey
        parameters:
          key: "Escape"
